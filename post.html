<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3ZBELZMYPK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-3ZBELZMYPK');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-5192540925886631">
    <title id="page-title">LottoPro Blog</title>
    <meta name="description" id="page-desc" content="LottoPro Blog — Lottery analysis and strategy.">
    <meta property="og:type" content="article">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5192540925886631" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .post-container { max-width: 740px; margin: 0 auto; padding: 2rem 1rem 4rem; }
        .post-back { display: inline-flex; align-items: center; gap: 0.4rem; color: #2563eb; font-size: 0.875rem; font-weight: 600; text-decoration: none; margin-bottom: 1.5rem; }
        .post-back:hover { text-decoration: underline; }
        .post-header { margin-bottom: 2rem; }
        .post-header-meta { display: flex; align-items: center; gap: 0.6rem; font-size: 0.8rem; color: var(--text-muted, #64748b); margin-bottom: 0.75rem; }
        .post-category { background: #dbeafe; color: #1d4ed8; font-weight: 700; padding: 0.15rem 0.6rem; border-radius: 999px; font-size: 0.72rem; }
        .dark .post-category { background: #1e3a5f; color: #93c5fd; }
        .post-header h1 { font-size: 1.75rem; font-weight: 800; line-height: 1.3; margin: 0; }
        .post-body { font-size: 1rem; line-height: 1.8; color: var(--text-color); }
        .post-body h2 { font-size: 1.25rem; font-weight: 700; margin: 2rem 0 0.75rem; color: var(--text-color); border-bottom: 2px solid var(--toggle-bg); padding-bottom: 0.4rem; }
        .post-body p { margin: 0 0 1rem; }
        .post-body ul, .post-body ol { padding-left: 1.5rem; margin: 0 0 1rem; }
        .post-body li { margin-bottom: 0.4rem; }
        .post-body strong { font-weight: 700; }
        .post-body em { font-style: italic; }
        .post-table { width: 100%; border-collapse: collapse; margin: 1rem 0 1.5rem; font-size: 0.875rem; }
        .post-table th { background: var(--toggle-bg); padding: 0.6rem 0.75rem; text-align: left; font-weight: 700; }
        .post-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--toggle-bg); }
        .post-table tr:last-child td { border-bottom: none; }
        .post-formula { background: var(--toggle-bg); padding: 0.6rem 1rem; border-radius: 0.5rem; font-family: monospace; font-size: 0.95rem; margin: 0.5rem 0 1rem; display: inline-block; }
        .post-divider { border: none; border-top: 1px solid var(--toggle-bg); margin: 2.5rem 0; }
        .post-related { margin-top: 2rem; }
        .post-related h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
        .related-card { background: var(--container-bg); border: 1px solid var(--toggle-bg); border-radius: 0.75rem; padding: 1rem; text-decoration: none; color: inherit; display: block; }
        .related-card:hover { border-color: #2563eb; }
        .related-card h4 { font-size: 0.875rem; font-weight: 700; margin: 0 0 0.3rem; line-height: 1.4; }
        .related-card span { font-size: 0.75rem; color: var(--text-muted, #64748b); }
        @media (max-width: 480px) { .post-header h1 { font-size: 1.35rem; } .post-body h2 { font-size: 1.1rem; } }
    </style>
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <a href="/" class="logo" style="text-decoration:none;color:inherit;">LottoPro</a>
            <div class="nav-controls">
                <div class="lang-selector">
                    <button class="lang-btn" data-lang="en" title="English">🇺🇸 EN</button>
                    <button class="lang-btn" data-lang="ko" title="한국어">🇰🇷 KO</button>
                    <button class="lang-btn" data-lang="ja" title="日本語">🇯🇵 JA</button>
                </div>
                <button id="theme-toggle" title="Toggle Dark/Light Mode"><span class="icon">🌙</span></button>
            </div>
        </nav>
    </header>

    <main class="content-wrapper">
        <div class="ad-unit ad-top">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5192540925886631" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="post-container">
            <a class="post-back" href="blog.html" id="back-link">← Back to Blog</a>
            <div id="post-content">
                <p style="color:var(--text-muted,#64748b)">Loading…</p>
            </div>

            <div class="ad-unit" style="margin: 2rem 0;">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5192540925886631" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <hr class="post-divider">
            <div class="post-related" id="post-related"></div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 LottoPro. <a href="privacy-policy.html">Privacy Policy</a> · <a href="terms-of-service.html">Terms</a> · <a href="about.html">About</a></p>
    </footer>

    <script src="data/posts.js"></script>
    <script>
        // ── Theme ──────────────────────────────────────────────────────────────
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'dark') document.body.classList.add('dark');
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            document.querySelector('#theme-toggle .icon').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        });
        if (savedTheme === 'dark') document.querySelector('#theme-toggle .icon').textContent = '☀️';

        // ── Language ──────────────────────────────────────────────────────────
        const params = new URLSearchParams(location.search);
        const postId = params.get('id');
        let currentLang = params.get('lang') || localStorage.getItem('lang') || 'en';

        const UI_TEXT = {
            en: { back: '← Back to Blog', related: 'Related Articles', notFound: 'Post not found.' },
            ko: { back: '← 블로그로 돌아가기', related: '관련 글', notFound: '글을 찾을 수 없습니다.' },
            ja: { back: '← ブログに戻る', related: '関連記事', notFound: '記事が見つかりません。' },
        };

        function applyLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
            document.documentElement.lang = lang;
            renderPost(lang);
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => applyLang(btn.dataset.lang));
        });

        function renderPost(lang) {
            const t = UI_TEXT[lang] || UI_TEXT.en;
            document.getElementById('back-link').textContent = t.back;

            const post = POSTS.find(p => p.id === postId);
            if (!post) {
                document.getElementById('post-content').innerHTML = `<p>${t.notFound}</p>`;
                return;
            }

            const title = post.title[lang] || post.title.en;
            const content = post.content[lang] || post.content.en;
            const category = post.category[lang] || post.category.en;

            document.title = `${title} — LottoPro Blog`;
            document.getElementById('page-title').textContent = `${title} — LottoPro Blog`;
            document.getElementById('page-desc').setAttribute('content', post.summary[lang] || post.summary.en);

            document.getElementById('post-content').innerHTML = `
                <div class="post-header">
                    <div class="post-header-meta">
                        <span class="post-category">${category}</span>
                        <span>${post.date}</span>
                    </div>
                    <h1>${title}</h1>
                </div>
                <div class="post-body">${content}</div>
            `;

            // Related posts (same category, excluding current)
            const related = POSTS.filter(p => p.id !== postId && (p.category[lang] || p.category.en) === category).slice(0, 3);
            if (related.length) {
                document.getElementById('post-related').innerHTML = `
                    <h3>${t.related}</h3>
                    <div class="related-grid">
                        ${related.map(r => `
                            <a class="related-card" href="post.html?id=${r.id}&lang=${lang}">
                                <h4>${r.title[lang] || r.title.en}</h4>
                                <span>${r.date}</span>
                            </a>
                        `).join('')}
                    </div>
                `;
            } else {
                document.getElementById('post-related').innerHTML = '';
            }
        }

        applyLang(currentLang);
    </script>
</body>
</html>
