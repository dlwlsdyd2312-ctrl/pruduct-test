<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5192540925886631"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" title="Toggle Dark/Light Mode">
            <span class="icon">🌙</span>
        </button>
    </div>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div id="lotto-numbers" class="lotto-numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="contact-container">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/xwvywojg" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your Name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="_replyto" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required placeholder="How can we help you?"></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
